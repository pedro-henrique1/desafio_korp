services:
  http-server-projeto-korp:
    build: ./http-server
    container_name: http-server-projeto-korp
    networks:
      - korp-network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
    - ./nginx/http-server-projeto-korp.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - http-server-projeto-korp
    networks:
      - korp-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - korp-network
    restart: unless-stopped  

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - korp-network
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboard:/var/lib/grafana/dashboards:ro  
    restart: unless-stopped  


networks:
  korp-network:
    external: true
    name: korp-network
